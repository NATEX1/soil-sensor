name: soil_sensor
description: SoilSensor - ระบบวิเคราะห์ดินอัจฉริยะ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # BLE
  flutter_blue_plus: ^1.32.12

  # Wi-Fi / HTTP
  connectivity_plus: ^5.0.2
  http: ^1.2.0

  # Location / Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # State management
  provider: ^6.1.2

  # Excel export
  excel: ^4.0.2
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # Charts
  fl_chart: ^0.68.0

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
