<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" fill="#f8f9fb"/>
  
  <defs>
    <clipPath id="soilClip">
      <circle cx="250" cy="280" r="130"/>
    </clipPath>
    
    <!-- Leaf Lobe (Split Tone) -->
    <g id="leafLobe">
      <path d="M 250 190 C 215 140 235 60 250 40 L 250 190 Z" fill="#1ca65b"/>
      <path d="M 250 190 C 285 140 265 60 250 40 L 250 190 Z" fill="#0f8644"/>
    </g>

    <!-- Cassava Tuber -->
    <g id="tuber">
      <!-- Base Tuber -->
      <path d="M 225 190 L 225 300 A 25 25 0 0 0 275 300 L 275 190 Z" fill="#f29a20"/>
      <!-- Tuber Right Shadow -->
      <path d="M 250 190 L 250 300 A 25 25 0 0 0 275 300 L 275 190 Z" fill="#d17511"/>
      <!-- Tech Line -->
      <line x1="250" y1="190" x2="250" y2="280" stroke="#3b82f6" stroke-width="4"/>
      <circle cx="250" cy="280" r="8" fill="#ffffff" stroke="#3b82f6" stroke-width="3"/>
      <circle cx="250" cy="280" r="3" fill="#3b82f6"/>
    </g>
  </defs>

  <!-- Wi-Fi Waves -->
  <path d="M 210 -5 Q 250 -30 290 -5" fill="none" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/>
  <path d="M 225 15 Q 250 -5 275 15" fill="none" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/>
  <circle cx="250" cy="35" r="6" fill="#60a5fa"/>

  <!-- Soil Circle -->
  <g clip-path="url(#soilClip)">
    <!-- Top layer -->
    <rect x="100" y="100" width="300" height="150" fill="#905e3a"/>
    <!-- Middle layer -->
    <rect x="100" y="250" width="300" height="50" fill="#764b2d"/>
    <!-- Bottom layer -->
    <rect x="100" y="300" width="300" height="150" fill="#563620"/>
  </g>

  <!-- Tubers (Fanning out) -->
  <use href="#tuber" transform="translate(250, 190) rotate(-45) scale(0.9) translate(-250, -190)"/>
  <use href="#tuber" transform="translate(250, 190) rotate(45) scale(0.9) translate(-250, -190)"/>
  <use href="#tuber"/>

  <!-- Cassava Leaves (7 lobes fanning out) -->
  <use href="#leafLobe" transform="translate(250, 190) rotate(-100) scale(0.6) translate(-250, -190)"/>
  <use href="#leafLobe" transform="translate(250, 190) rotate(100) scale(0.6) translate(-250, -190)"/>
  <use href="#leafLobe" transform="translate(250, 190) rotate(-68) scale(0.75) translate(-250, -190)"/>
  <use href="#leafLobe" transform="translate(250, 190) rotate(68) scale(0.75) translate(-250, -190)"/>
  <use href="#leafLobe" transform="translate(250, 190) rotate(-35) scale(0.9) translate(-250, -190)"/>
  <use href="#leafLobe" transform="translate(250, 190) rotate(35) scale(0.9) translate(-250, -190)"/>
  <use href="#leafLobe"/>

  <!-- Center Connection Circle -->
  <circle cx="250" cy="190" r="14" fill="#0f6c38"/>

  <!-- Typography -->
  <text x="250" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="68" fill="#1c2533" text-anchor="middle" letter-spacing="1">Soilava</text>
</svg>
